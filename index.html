<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Lidovec – Mladí Lidovci</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Cinzel:wght@700;900&display=swap');
:root{--b:#003087;--y:#FFD700;--d:#001a4d;--g:#e6b800;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:radial-gradient(ellipse at center,#001a4d,#000a1a);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;font-family:'Press Start 2P',monospace;}
#wrap{position:relative;width:400px;height:620px;}
canvas{display:block;border:4px solid var(--y);box-shadow:0 0 0 2px var(--b),0 0 40px rgba(255,215,0,.45),0 0 100px rgba(255,215,0,.12);image-rendering:pixelated;cursor:pointer;}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;height:52px;background:linear-gradient(135deg,rgba(0,48,135,.97),rgba(0,26,77,.97));border-bottom:3px solid var(--y);display:flex;align-items:center;padding:0 14px;pointer-events:none;z-index:10;gap:10px;}
#hudPct{font-size:11px;color:var(--y);text-shadow:0 0 12px rgba(255,215,0,.9);white-space:nowrap;min-width:52px;}
#hudBarWrap{flex:1;display:flex;flex-direction:column;gap:3px;}
#hudBarLabel{font-size:5px;color:rgba(255,215,0,.7);text-align:center;}
#hudBar{height:14px;background:rgba(255,255,255,.08);border:2px solid var(--y);position:relative;overflow:hidden;}
#hudFill{height:100%;width:0%;background:linear-gradient(90deg,#003087,#0052cc,#FFD700);transition:width .4s cubic-bezier(.4,2,.6,1);}
#mark5{position:absolute;left:33.33%;top:0;bottom:0;width:2px;background:#ff4444;z-index:2;}
#mark5::after{content:'5%';position:absolute;top:-14px;left:-8px;font-size:5px;color:#ff6666;font-family:'Press Start 2P',monospace;}
#hudBest{font-size:6px;color:rgba(255,215,0,.5);white-space:nowrap;min-width:68px;text-align:right;}

/* OVERLAY – full screen panels */
#ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,rgba(0,26,77,.97),rgba(0,8,20,.99));z-index:20;padding:16px 18px 14px;gap:6px;}

/* shared overlay elements */
.gtitle{font-family:'Cinzel',serif;font-size:28px;color:#fff;text-align:center;line-height:1.1;letter-spacing:2px;text-shadow:0 0 30px rgba(255,215,0,.3);}
.gtitle span{color:var(--y);}
.div{width:160px;height:2px;background:linear-gradient(90deg,transparent,var(--y),transparent);margin:2px 0;}
.sub{font-size:6.5px;color:rgba(255,255,255,.7);text-align:center;line-height:1.9;max-width:280px;font-family:sans-serif;font-style:italic;}

/* name input */
#nameWrap{width:100%;max-width:300px;display:flex;flex-direction:column;gap:8px;align-items:center;}
#nameWrap label{font-size:6px;color:var(--y);}
#nameInp{width:100%;padding:9px 12px;background:rgba(255,255,255,.08);border:2px solid var(--y);color:#fff;font-family:'Press Start 2P',monospace;font-size:11px;text-align:center;outline:none;}
#nameInp::placeholder{color:rgba(255,255,255,.3);font-size:8px;}
#nameInp:focus{border-color:#fff;background:rgba(255,255,255,.12);}
#nameErr{font-size:6px;color:#ff6666;min-height:11px;}

/* countdown */
#countdown{font-size:72px;color:var(--y);text-shadow:0 0 30px rgba(255,215,0,.8);text-align:center;font-family:'Cinzel',serif;animation:pop .25s ease-out;}
@keyframes pop{from{transform:scale(1.6);}to{transform:scale(1);}}

/* result */
#resBlock{background:rgba(0,48,135,.5);border:2px solid var(--y);padding:10px 16px;text-align:center;width:100%;max-width:340px;}
#resPct{font-size:28px;color:var(--y);text-shadow:0 0 20px rgba(255,215,0,.9);display:block;margin-bottom:4px;}
.resBar{height:14px;background:rgba(255,255,255,.08);border:2px solid var(--y);position:relative;margin:6px 0;overflow:visible;}
.resBarFill{height:100%;background:linear-gradient(90deg,#003087,#FFD700);transition:width 1.2s cubic-bezier(.4,2,.6,1);width:0%;}
.resMark{position:absolute;left:33.33%;top:-2px;bottom:-2px;width:3px;background:#ff4444;}
.resMark::after{content:'5%';position:absolute;top:-14px;left:-10px;font-size:5px;color:#ff6666;white-space:nowrap;font-family:'Press Start 2P',monospace;}
#resMsg{font-size:7px;color:#fff;line-height:2;font-family:sans-serif;white-space:pre-line;}

/* mini leaderboard after game */
#miniLb{width:100%;max-width:340px;}
#miniLb table{width:100%;border-collapse:collapse;}
#miniLb tr{border-bottom:1px solid rgba(255,215,0,.12);}
#miniLb tr.me td{color:var(--y);background:rgba(255,215,0,.07);}
#miniLb td{padding:3px 5px;font-size:5.5px;color:rgba(255,255,255,.8);font-family:'Press Start 2P',monospace;}
#miniLb td:first-child{width:20px;color:rgba(255,215,0,.5);}
#miniLb td:last-child{text-align:right;color:var(--y);}
#miniLbTitle{font-size:7px;color:var(--y);text-align:center;margin-bottom:5px;letter-spacing:1px;}
#miniLbLoading{font-size:6px;color:rgba(255,255,255,.4);text-align:center;padding:6px;}

/* full leaderboard */
#fullLb{width:100%;max-width:340px;display:none;}
#fullLb.show{display:block;}
#fullLb table{width:100%;border-collapse:collapse;}
#fullLb tr{border-bottom:1px solid rgba(255,215,0,.12);}
#fullLb td{padding:4px 6px;font-size:6px;color:rgba(255,255,255,.85);font-family:'Press Start 2P',monospace;}
#fullLb td:first-child{width:22px;color:rgba(255,215,0,.5);}
#fullLb td:nth-child(3){font-size:5px;color:rgba(255,255,255,.3);text-align:center;}
#fullLb td:last-child{text-align:right;color:var(--y);}
#fullLbLoading{font-size:6px;color:rgba(255,255,255,.4);text-align:center;padding:8px;}

/* ML logo in overlay */
#mlMenu{display:flex;align-items:center;justify-content:center;}
#mlMenu img{height:32px;filter:drop-shadow(0 0 6px rgba(255,215,0,.35));}
#mlLbCredit{text-align:center;margin-top:4px;}
#mlLbCredit img{height:18px;opacity:.65;vertical-align:middle;}
#mlLbCredit span{font-size:5px;color:rgba(255,215,0,.5);font-family:sans-serif;vertical-align:middle;margin-left:5px;}

/* buttons */
.brow{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.btn{padding:10px 18px;background:var(--y);color:var(--d);border:none;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;letter-spacing:1px;box-shadow:3px 3px 0 var(--g),0 0 18px rgba(255,215,0,.3);transition:transform .07s,box-shadow .07s;}
.btn:hover{background:#ffe033;}
.btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--g);}
.btn.sec{background:rgba(255,215,0,.12);color:var(--y);border:2px solid var(--y);box-shadow:none;}
.btn.sec:hover{background:rgba(255,215,0,.2);}
#instr{font-size:5.5px;color:rgba(255,255,255,.28);text-align:center;line-height:2.1;}
.hidden{display:none!important;}

/* 5% celebration flash */
#flash{position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;pointer-events:none;opacity:0;}
#flash.go{animation:flashAnim 2.8s ease-in-out forwards;}
@keyframes flashAnim{0%{opacity:0;background:rgba(255,215,0,0)}10%{opacity:1;background:rgba(255,215,0,.9)}70%{opacity:1;background:rgba(255,215,0,.85)}100%{opacity:0;background:rgba(255,215,0,0)}}
#flash .ftxt{font-family:'Cinzel',serif;font-size:22px;color:#003087;text-align:center;font-weight:900;line-height:1.2;}
#flash .fsub{font-size:7px;color:#003087;font-family:'Press Start 2P',monospace;text-align:center;}
#flash img{height:52px;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="400" height="620"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="hudPct">0 %</div>
    <div id="hudBarWrap">
      <div id="hudBarLabel">Volební průzkum – KDU-ČSL</div>
      <div id="hudBar"><div id="hudFill"></div><div id="mark5"></div></div>
    </div>
    <div id="hudBest">Rekord: 0 %</div>
  </div>

  <!-- OVERLAY -->
  <div id="ov">
    <!-- MENU -->
    <div id="pMenu">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
        <div class="gtitle">FLAPPY<br><span>LIDOVEC</span></div>
        <div class="div"></div>
        <div id="mlMenu"><img id="mlMenuImg" src="" alt="Mladí Lidovci"></div>
        <div class="sub">„Pomoz dostat s Honzou lidovce do Sněmovny!"<br>Každý průlet = +1 % ve volbách · Cíl: 5 %!</div>
        <div id="nameWrap">
          <label for="nameInp">✏️ Zadej své jméno:</label>
          <input type="text" id="nameInp" maxlength="16" placeholder="Tvoje jméno..." autocomplete="off" spellcheck="false">
          <div id="nameErr"></div>
        </div>
        <div class="brow">
          <button class="btn" id="btnStart">▶ KAMPAŇ</button>
          <button class="btn sec" id="btnLb">🏆 SÍŇ SLÁVY</button>
        </div>
        <div id="instr">MEZERNÍK · KLIK · TAP = skok</div>
      </div>
    </div>

    <!-- COUNTDOWN (3…2…1…START) -->
    <div id="pCountdown" class="hidden">
      <div id="countdown">3</div>
      <div class="sub" style="margin-top:12px" id="cdName"></div>
    </div>

    <!-- RESULT after game -->
    <div id="pResult" class="hidden">
      <div style="display:flex;flex-direction:column;align-items:center;gap:5px;width:100%;max-width:340px;">
        <div class="gtitle" id="resTitle">–</div>
        <div id="resBlock">
          <span id="resPct">0 %</span>
          <div class="resBar"><div class="resBarFill" id="resBarFill"></div><div class="resMark"></div></div>
          <div id="resMsg"></div>
        </div>
        <!-- Mini leaderboard top 5 -->
        <div id="miniLb">
          <div id="miniLbTitle">🏆 TOP 5 HRÁČŮ</div>
          <div id="miniLbLoading">Načítám…</div>
          <table id="miniLbTable" style="display:none"></table>
        </div>
        <div class="brow">
          <button class="btn" id="btnAgain">↺ ZNOVU</button>
          <button class="btn sec" id="btnFullLb">SÍŇ SLÁVY</button>
        </div>
      </div>
    </div>

    <!-- FULL LEADERBOARD -->
    <div id="pLb" class="hidden">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;max-width:340px;">
        <div class="gtitle">🏆 <span>SÍŇ SLÁVY</span></div>
        <div class="div"></div>
        <div id="fullLb">
          <div id="fullLbLoading">Načítám výsledky…</div>
          <table id="fullLbTable" style="display:none"></table>
        </div>
        <div id="mlLbCredit"><img id="mlLbImg" src="" alt="ML"><span>mladilidovci.cz</span></div>
        <div class="brow">
          <button class="btn sec" id="btnLbBack">← ZPĚT</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 5% FLASH -->
  <div id="flash">
    <div class="ftxt">5 %!</div>
    <img id="flashImg" src="" alt="">
    <div class="ftxt">JSME VE SNĚMOVNĚ!</div>
    <div class="fsub">mladilidovci.cz</div>
  </div>
</div>

async function sbSave(name, score){
  try{
    await fetch(`${SB_URL}/rest/v1/scores`,{
      method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({name:name.trim(),score})
    });
  }catch(e){console.warn('save err',e);}
}
async function sbLoad(limit=10){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/scores?select=name,score,created_at&order=score.desc,created_at.asc&limit=${limit}`,
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    if(!r.ok)return[];
    return await r.json();
  }catch(e){return[];}
}

const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const W=400,H=620;

// ── State ──

// ── Background ──
function drawBg(){
  bgOff=(bgOff+speed*.4)%(W*2);
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#6ab4d8');g.addColorStop(.45,'#94ccec');g.addColorStop(.75,'#bde4f8');g.addColorStop(1,'#c8f0b0');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // far hills
  ctx.fillStyle='#a8d888';ctx.beginPath();ctx.moveTo(0,H-115);
  for(let x=0;x<=W;x+=5)ctx.lineTo(x,H-115+Math.sin(x*.017+1.1)*20+Math.sin(x*.008+.4)*12);
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
  // near hills
  ctx.fillStyle='#7ec060';ctx.beginPath();ctx.moveTo(0,H-88);
  for(let x=0;x<=W;x+=4){const o=bgOff*.14;ctx.lineTo(x,H-88+Math.sin((x+o)*.021)*16+Math.sin((x+o)*.01)*9);}
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
  drawClouds();drawTrees();drawScenery();
}
function drawClouds(){
  [[55,52,85,26,.30],[205,36,62,19,.26],[325,68,75,22,.33],[145,26,50,15,.20],[475,48,68,20,.28]].forEach(([bx,by,bw,bh,sp])=>{
    const x=((bx-bgOff*sp)%(W+150)+W+150)%(W+150)-75;
    ctx.fillStyle='rgba(255,255,255,.88)';cl(x,by,bw,bh);
    ctx.fillStyle='rgba(190,215,235,.36)';cl(x+3,by+7,bw*.88,bh*.55);
  });
}
function cl(x,y,w,h){ctx.beginPath();ctx.ellipse(x+w*.22,y+h*.65,w*.25,h*.50,0,0,Math.PI*2);ctx.ellipse(x+w*.51,y+h*.37,w*.29,h*.61,0,0,Math.PI*2);ctx.ellipse(x+w*.79,y+h*.60,w*.21,h*.47,0,0,Math.PI*2);ctx.fill();}
function drawTrees(){
  [15,55,90,135,170,225,268,315,355,398,438,485].forEach(bx=>{

    ctx.fillStyle='#4a2e10';ctx.fillRect(x-3,ty-10,6,10);
    ctx.fillStyle='#2a6a1a';ctx.fillRect(x-9,ty-th+8,18,th-4);
    ctx.fillStyle='#38882a';ctx.fillRect(x-7,ty-th,14,th-8);
    ctx.fillStyle='#48a836';ctx.fillRect(x-4,ty-th-5,8,9);
  });
}
function drawScenery(){
  const cx=((260-bgOff*.07)%(W+220)+W+220)%(W+220)-110,base=H-89;
  // church
  ctx.fillStyle='#ede5d5';ctx.fillRect(cx,base-30,36,30);
  ctx.fillStyle='#b03028';ctx.beginPath();ctx.moveTo(cx-3,base-30);ctx.lineTo(cx+18,base-48);ctx.lineTo(cx+39,base-30);ctx.closePath();ctx.fill();
  ctx.fillStyle='#d8d0c0';ctx.fillRect(cx+26,base-50,17,50);
  ctx.fillStyle='#8a1818';ctx.beginPath();ctx.moveTo(cx+22,base-50);ctx.lineTo(cx+34,base-69);ctx.lineTo(cx+47,base-50);ctx.closePath();ctx.fill();
  ctx.fillStyle='#FFD700';ctx.fillRect(cx+32,base-79,3,12);ctx.fillRect(cx+27,base-73,13,3);
  ctx.fillStyle='#88ccee';ctx.fillRect(cx+5,base-24,7,9);ctx.fillRect(cx+22,base-24,7,9);ctx.fillRect(cx+29,base-42,9,10);
  ctx.fillStyle='#5a3010';ctx.fillRect(cx+12,base-15,10,15);ctx.beginPath();ctx.arc(cx+17,base-15,5,Math.PI,0);ctx.fill();
  // house
  const hx=cx+50;
  ctx.fillStyle='#f0e8d5';ctx.fillRect(hx,base-20,24,20);
  ctx.fillStyle='#b03028';ctx.beginPath();ctx.moveTo(hx-3,base-20);ctx.lineTo(hx+12,base-34);ctx.lineTo(hx+27,base-20);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ffe090';ctx.fillRect(hx+3,base-16,6,6);ctx.fillRect(hx+13,base-16,6,6);
  // BILLBOARD with ML logo
  const bx=cx+88;
  ctx.fillStyle='#5a3010';ctx.fillRect(bx+14,base-48,4,48);ctx.fillRect(bx+32,base-48,4,48);
  ctx.fillStyle='#fff';ctx.fillRect(bx,base-68,54,24);
  ctx.strokeStyle='#003087';ctx.lineWidth=2;ctx.strokeRect(bx,base-68,54,24);
  if(mlReady){ctx.drawImage(mlImg,bx+1,base-67,52,22);}
  else{ctx.fillStyle='#003087';ctx.font='bold 5px sans-serif';ctx.textAlign='center';ctx.fillText('MLADÍ LIDOVCI',bx+27,base-53);}
}
function drawGround(){
  ctx.fillStyle='#4a9a30';ctx.fillRect(0,H-62,W,62);
  ctx.fillStyle='#3a8220';ctx.fillRect(0,H-62,W,7);
  for(let i=0;i<20;i++){const gx=((i*22-bgOff*.55)%(W+44)+W+44)%(W+44)-22;ctx.fillStyle='#2a6814';ctx.fillRect(gx,H-64,4,6);ctx.fillRect(gx+6,H-66,3,8);ctx.fillRect(gx+12,H-63,4,5);}
  ctx.textAlign='center';
  ctx.fillStyle='#ff6666';ctx.font='bold 7px "Press Start 2P",monospace';ctx.fillText('⚠ PROPADNUTÍ POD 5 % ⚠',W/2,H-40);
  ctx.fillStyle='rgba(255,220,80,.85)';ctx.font='6px "Press Start 2P",monospace';ctx.fillText('Mimo Poslaneckou sněmovnu!',W/2,H-24);
}
function drawPipes(){
  pipes.forEach(p=>{
    pl(p.x,52,PW,p.top-52,true);const by=p.top+GAP;pl(p.x,by,PW,H-62-by,false);
    if(!p.passed){const gy=p.top+GAP/2;ctx.save();ctx.globalAlpha=.85+Math.sin(frames*.12)*.12;ctx.fillStyle='#FFD700';ctx.font='bold 9px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillText('+1 %',p.x+PW/2,gy+4);ctx.restore();}
  });
}
function pl(x,y,w,h,top){
  if(h<=2)return;
  const g=ctx.createLinearGradient(x,0,x+w,0);
  g.addColorStop(0,'#9a7200');g.addColorStop(.15,'#d4a000');g.addColorStop(.45,'#FFD700');g.addColorStop(.72,'#d4a000');g.addColorStop(1,'#7a5800');
  ctx.fillStyle=g;ctx.fillRect(x,y,w,h);
  ctx.fillStyle='rgba(0,48,135,.45)';ctx.fillRect(x+w/2-4,y,8,h);
  ctx.fillStyle='rgba(255,255,200,.28)';ctx.fillRect(x+5,y,7,h);
  ctx.fillStyle='rgba(60,40,0,.38)';ctx.fillRect(x+w-7,y,7,h);
  const cH=22,cX=x-6,cW=w+12,cY=top?y+h-cH:y;
  const cg=ctx.createLinearGradient(cX,0,cX+cW,0);
  cg.addColorStop(0,'#7a5800');cg.addColorStop(.18,'#c49000');cg.addColorStop(.5,'#FFD700');cg.addColorStop(.82,'#c49000');cg.addColorStop(1,'#6a4800');
  ctx.fillStyle=cg;ctx.fillRect(cX,cY,cW,cH);
  ctx.fillStyle='rgba(255,255,180,.26)';ctx.fillRect(cX+4,cY+3,9,cH-6);
  ctx.save();ctx.globalAlpha=.8;ctx.fillStyle='#003087';ctx.font='bold 6px "Press Start 2P",monospace';ctx.textAlign='center';
  if(top&&h>70){ctx.translate(x+w/2,y+Math.min(h/2,90));ctx.fillText('ANO',0,-8);ctx.fillText('KOALICE',0,5);}
  else if(!top&&h>55){ctx.translate(x+w/2,y+Math.min(h/2,60));ctx.fillText('POD',0,-8);ctx.fillText('5 %',0,5);}
  ctx.restore();
}
function drawBird(){
  ctx.save();ctx.translate(bird.x,bird.y);ctx.rotate(Math.min(.32,Math.max(-.20,bird.vy*.052)));
  if(spReady)ctx.drawImage(sprite,-SW/2,-SH/2,SW,SH);
  else{ctx.fillStyle='#f0c090';ctx.beginPath();ctx.arc(0,0,24,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}
function spawnParts(x,y){for(let i=0;i<24;i++){const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*5.5;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:.02+Math.random()*.02,col:Math.random()>.45?'#FFD700':'#003087',sz:3+Math.random()*5});}}
function drawParts(){parts=parts.filter(p=>p.life>0);parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.life-=p.decay;ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);});ctx.globalAlpha=1;}

function updateHUD(){
  const pct=Math.min(score,15);document.getElementById('hudFill').style.width=(pct/15*100)+'%';
  const el=document.getElementById('hudPct');el.textContent=score+' %';el.style.color=score>=5?'#FFD700':'#ff8888';
  document.getElementById('hudBest').textContent='Rekord: '+bestScore+' %';
}
function spawnPipe(){const mn=100,mx=H-62-GAP-100;pipes.push({x:W+10,top:Math.floor(Math.random()*(mx-mn)+mn),passed:false});}
function checkHit(){
  const r=26;if(bird.y+r>=H-62||bird.y-r<=52)return true;
  for(let p of pipes)if(bird.x+r>p.x+4&&bird.x-r<p.x+PW-4&&(bird.y-r<p.top||bird.y+r>p.top+GAP))return true;
  return false;
}

function update(){
  if(gstate!=='playing')return;
  frames++;if(shake>0)shake-=.6;
  bird.vy+=GR;bird.y+=bird.vy;
  pipes.forEach(p=>p.x-=speed);pipes=pipes.filter(p=>p.x+PW>-10);
  if(frames%PI===0)spawnPipe();
  pipes.forEach(p=>{
    if(!p.passed&&p.x+PW<bird.x){
      p.passed=true;score++;speed=2.4+score*.055;
      if(score===5&&!fiveShown){fiveShown=true;showFlash();}
    }
  });
  if(checkHit()){gstate='dead';shake=10;spawnParts(bird.x,bird.y);if(score>bestScore)bestScore=score;handleDeath();}
}
function render(){
  ctx.save();
  if(shake>0)ctx.translate((Math.random()-.5)*shake*.5,(Math.random()-.5)*shake*.5);
  drawBg();drawPipes();drawGround();drawParts();
  if(gstate==='playing'||gstate==='dead')drawBird();
  updateHUD();ctx.restore();
}
function loop(){update();render();requestAnimationFrame(loop);}

// ── 5% flash ──
function showFlash(){
  const f=document.getElementById('flash');
  f.classList.remove('go');void f.offsetWidth;f.classList.add('go');
}

// ── Death ──
async function handleDeath(){
  sbSave(pname,score); // fire and forget – don't await
  setTimeout(async()=>{
    showPanel('pResult');
    document.getElementById('resPct').textContent=score+' %';
    setTimeout(()=>{document.getElementById('resBarFill').style.width=Math.min((score/15)*100,100)+'%';},100);
    const s=score;
    let title,msg;
    if(s===0){title='💔 Ani procento!';msg='Zkus to znovu!';}
    else if(s<3){title='😢 Těžká rána';msg=s+' % – daleko pod 5 %.';}
    else if(s<5){title='😬 Těsně pod 5 %!';msg=s+' % – o fous! Skoro tam!';}
    else if(s===5){title='🎉 Přesně 5 %!';msg='KDU-ČSL je ve Sněmovně!';}
    else if(s<8){title='✅ Solidní výsledek!';msg=s+' % – výborně!';}
    else if(s<12){title='🏆 Skvělé volby!';msg=s+' % – KDU-ČSL silná!';}
    else{title='⭐ Legenda lidovců!';msg=s+' % – historický úspěch!';}
    document.getElementById('resTitle').textContent=title;
    document.getElementById('resMsg').textContent=msg;
    // Load mini top-5
    loadMiniLb();
  },700);
}

async function loadMiniLb(){
  const load=document.getElementById('miniLbLoading');
  const tbl=document.getElementById('miniLbTable');
  load.textContent='Načítám…';load.style.display='block';tbl.style.display='none';
  const scores=await sbLoad(5);
  load.style.display='none';
  if(!scores.length){load.textContent='Zatím žádné výsledky.';load.style.display='block';return;}
  const medals=['🥇','🥈','🥉'];
  tbl.innerHTML=scores.map((s,i)=>{
    const me=s.name===pname&&s.score===score;
    const m=i<3?`<span style="color:${['#FFD700','#C0C0C0','#cd7f32'][i]}">${medals[i]}</span>`:`${i+1}.`;
    return`<tr class="${me?'me':''}""><td>${m}</td><td>${esc(s.name)}</td><td>${s.score} %</td></tr>`;
  }).join('');
  tbl.style.display='table';
}

async function loadFullLb(){
  const load=document.getElementById('fullLbLoading');
  const tbl=document.getElementById('fullLbTable');
  load.textContent='Načítám…';load.style.display='block';tbl.style.display='none';
  const scores=await sbLoad(15);
  load.style.display='none';
  if(!scores.length){load.textContent='Zatím žádné výsledky.';load.style.display='block';return;}
  const medals=['🥇','🥈','🥉'];
  tbl.innerHTML=scores.map((s,i)=>{
    const m=i<3?`<span style="color:${['#FFD700','#C0C0C0','#cd7f32'][i]}">${medals[i]}</span>`:`${i+1}.`;
    const d=s.created_at?new Date(s.created_at).toLocaleDateString('cs-CZ'):'';
    return`<tr><td>${m}</td><td>${esc(s.name)}</td><td>${d}</td><td>${s.score} %</td></tr>`;
  }).join('');
  tbl.style.display='table';
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Panel management ──
const panels=['pMenu','pCountdown','pResult','pLb'];
function showPanel(id){
  panels.forEach(p=>{
    const el=document.getElementById(p);
    if(el)el.classList.toggle('hidden',p!==id);
  });
  document.getElementById('ov').classList.remove('hidden');
}
function hideOv(){ document.getElementById('ov').classList.add('hidden'); }

// ── Countdown ──
function startCountdown(){
  const name=validateName();if(!name)return;
  pname=name;
  if(!firstGame){beginGame();return;}  // no countdown on repeat
  showPanel('pCountdown');
  document.getElementById('cdName').textContent='Hodně štěstí, '+name+'!';
  let n=3;
  document.getElementById('countdown').textContent=n;
  const iv=setInterval(()=>{
    n--;
    const el=document.getElementById('countdown');
    if(n>0){el.textContent=n;el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');}
    else if(n===0){el.textContent='START!';}
    else{clearInterval(iv);beginGame();}
  },900);
}

function beginGame(){
  fiveShown=false;
  bird={x:90,y:300,vy:0};pipes=[];parts=[];score=0;frames=0;speed=2.4;bgOff=0;gstate='playing';
  firstGame=false;
  hideOv();
  setTimeout(()=>{if(gstate==='playing')spawnPipe();},900);
}

function validateName(){
  const v=document.getElementById('nameInp').value.trim();
  if(!v){document.getElementById('nameErr').textContent='Zadej jméno!';return null;}
  if(v.length<2){document.getElementById('nameErr').textContent='Alespoň 2 znaky!';return null;}
  document.getElementById('nameErr').textContent='';return v;
}

function playAgain(){
  // Keep name from input; no countdown
  const v=document.getElementById('nameInp').value.trim();
  if(v.length>=2)pname=v;
  fiveShown=false;
  bird={x:90,y:300,vy:0};pipes=[];parts=[];score=0;frames=0;speed=2.4;bgOff=0;gstate='playing';
  document.getElementById('resBarFill').style.width='0%';
  hideOv();
  setTimeout(()=>{if(gstate==='playing')spawnPipe();},900);
}

// ── Controls ──
function jump(){if(gstate==='playing')bird.vy=JP;}
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();
    if(gstate==='playing')jump();
    else if(gstate==='menu')startCountdown();
  }
  if(e.code==='Enter'&&gstate==='menu')startCountdown();
});
cv.addEventListener('click',jump);
cv.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});

document.getElementById('btnStart').addEventListener('click',startCountdown);
document.getElementById('btnLb').addEventListener('click',async()=>{showPanel('pLb');await loadFullLb();});
document.getElementById('btnAgain').addEventListener('click',playAgain);
document.getElementById('btnFullLb').addEventListener('click',async()=>{showPanel('pLb');await loadFullLb();});
document.getElementById('btnLbBack').addEventListener('click',()=>{
  if(gstate==='dead')showPanel('pResult');
  else showPanel('pMenu');
});

document.getElementById('nameInp').focus();
applyLogos();
loop();
</script>
</body>
</html>
